services:
  backend:
    image: ghcr.io/seiferla/myecho-backend:latest
    container_name: myecho-backend
    restart: unless-stopped
    ports:
      - "4444:4444"
    environment:
      TTS_API_KEY: ${TTS_API_KEY}
      TTS_MODEL: ${TTS_MODEL:-s2-pro}
      TTS_VOICE: ${TTS_VOICE:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4444/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
