name: Android Release

# Baut die signierte myEcho-Android-App auf GitHubs Runnern.
# Das native android/-Projekt liegt nicht im Repo, sondern wird hier per
# `expo prebuild` frisch erzeugt und dann mit Gradle gebaut.
#
# Auslöser:
#   - manuell (workflow_dispatch) mit Wahl APK oder AAB
#   - bei einem Versions-Tag v*.*.* -> Build + GitHub-Release mit angehängter Datei
on:
  workflow_dispatch:
    inputs:
      format:
        description: "Build-Format"
        type: choice
        options: [apk, aab]
        default: apk
  push:
    tags: ["v*.*.*"]

# Pro Branch/Tag nur ein Lauf gleichzeitig; ältere laufende Builds abbrechen.
concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # nötig, um bei Tags ein Release zu erstellen

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "17"
  # JS-basierte Actions auf den Node-24-Runtime zwingen. Ohne das laufen
  # actions/* noch auf dem ab Juni 2026 deprecateten Node-20-Runtime.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    # Quality-Gate (Typecheck) ist als erster Step in diesem Job integriert —
    # spart das doppelte Runner-Setup eines separaten quality-Jobs.
    name: Build (${{ github.event.inputs.format || 'apk' }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    env:
      FORMAT: ${{ github.event.inputs.format || 'apk' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      # Quality-Gate vor dem teuren nativen Build. Bricht früh ab, falls Typen kaputt.
      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle (mit Caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Versionsname bestimmen
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "name=$(node -p "require('./app.json').expo.version")" >> "$GITHUB_OUTPUT"
          fi

      # ----------------------------------------------------------------------
      # Prebuild-Cache:
      # `expo prebuild` ist deterministisch bezogen auf app.json + lockfile +
      # die App-Sourcen. Wenn nichts davon sich geändert hat, sparen wir uns
      # die Generierung des android/-Ordners komplett.
      #
      # Wichtig: Restore/Save sind getrennt, damit der NACHHER generierte
      # Keystore (android/app/myecho.keystore) NICHT mit in den Cache wandert.
      # ----------------------------------------------------------------------
      - name: Restore prebuild cache
        id: prebuild-cache
        uses: actions/cache/restore@v4
        with:
          path: mobile-app/android
          key: prebuild-${{ runner.os }}-${{ hashFiles('mobile-app/app.json', 'mobile-app/package-lock.json', 'mobile-app/app/**', 'mobile-app/assets/**') }}

      - name: Expo prebuild (Android)
        if: steps.prebuild-cache.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --no-install

      - name: Save prebuild cache
        if: steps.prebuild-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: mobile-app/android
          key: ${{ steps.prebuild-cache.outputs.cache-primary-key }}

      # ----------------------------------------------------------------------
      # Native-Build-Cache:
      # Cacht die teuren Outputs des Gradle-/C++-Builds (Hermes, JSI, fbjni,
      # Kotlin-Compile-Cache). Hat den Keystore explizit nicht im Pfad,
      # darf also bedenkenlos gespeichert werden.
      # ----------------------------------------------------------------------
      - name: Cache native build outputs
        uses: actions/cache@v4
        with:
          path: |
            mobile-app/android/.gradle
            mobile-app/android/app/.cxx
            mobile-app/node_modules/react-native/ReactAndroid/build
          key: native-${{ runner.os }}-${{ hashFiles('mobile-app/package-lock.json', 'mobile-app/android/build.gradle', 'mobile-app/android/app/build.gradle') }}
          restore-keys: |
            native-${{ runner.os }}-

      - name: Signing-Keystore aus Secrets einrichten
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Secret säubern: alle Whitespaces (inkl. Zeilenumbrüche) entfernen.
          B64="$(printf '%s' "$KEYSTORE_B64" | tr -d '[:space:]')"
          INVALID="$(printf '%s' "$B64" | tr -d 'A-Za-z0-9+/=' | wc -c | tr -d ' ')"
          # Diagnose (gibt nur Zahlen aus, nicht das Secret selbst):
          echo "Diagnose ANDROID_KEYSTORE_BASE64: Länge=${#B64} (erwartet ~3488), Nicht-base64-Zeichen=$INVALID (erwartet 0)"
          # Dekodieren; --ignore-garbage überspringt versehentlich mitkopierte Fremdzeichen.
          printf '%s' "$B64" | base64 --decode --ignore-garbage > android/app/myecho.keystore 2>/dev/null || true
          # Sanity-Check: gültiger Keystore mit diesem Passwort?
          if ! keytool -list -keystore android/app/myecho.keystore -storepass "$STORE_PASSWORD" >/dev/null 2>&1; then
            echo "::error::Keystore ungültig. Vermutlich ist ANDROID_KEYSTORE_BASE64 unvollständig (Länge ${#B64}, erwartet ~3488) oder ANDROID_KEYSTORE_PASSWORD falsch. Secret am besten per 'gh secret set' aus der Datei setzen."
            exit 1
          fi
          cat > android/keystore.properties <<EOF
          storeFile=myecho.keystore
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Gradle-Build
        working-directory: mobile-app/android
        env:
          # Monoton steigender versionCode pro Lauf; Versionsname aus Tag/app.json.
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: ${{ steps.version.outputs.name }}
          # Mehr Heap fürs Gradle-Daemon-JVM. ubuntu-latest hat 7 GB RAM;
          # 4 GB für Gradle verhindert GC-Thrashing bei großen RN-Builds.
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g"
        run: |
          # --no-daemon weggelassen: gradle/actions/setup-gradle managed den Daemon
          # und spart so pro Aufruf ~10s JVM-Startup.
          # --parallel: parallele Modul-Builds (RN/Expo verträgt das in aktuellen Versionen).
          COMMON_FLAGS="--build-cache --parallel --stacktrace"
          if [ "$FORMAT" = "aab" ]; then
            # AAB für den Store: alle ABIs (Google liefert pro Gerät die passende).
            ./gradlew bundleRelease $COMMON_FLAGS
          else
            # APK zum Sideloaden: nur arm64-v8a (alle modernen Phones) -> ~4x schneller.
            ./gradlew assembleRelease $COMMON_FLAGS \
              -PreactNativeArchitectures=arm64-v8a
          fi

      - name: Artefakt-Pfad ermitteln
        id: artifact
        working-directory: mobile-app/android
        run: |
          if [ "$FORMAT" = "aab" ]; then
            file=$(ls app/build/outputs/bundle/release/*.aab | head -1)
          else
            file=$(ls app/build/outputs/apk/release/*.apk | head -1)
          fi
          echo "path=mobile-app/android/$file" >> "$GITHUB_OUTPUT"

      - name: APK/AAB als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: myecho-${{ steps.version.outputs.name }}-${{ env.FORMAT }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      - name: GitHub-Release erstellen (nur bei Tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.path }}
          generate_release_notes: true
